services:
  backend:
    container_name: zoomscribe_backend
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: 8000
      DB_PATH: /app/data/scribe.db
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    volumes:
      - backend_data:/app/data
    networks:
      - zoomscribe_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    container_name: zoomscribe_frontend
    build:
      context: ./frontend
      args:
        VITE_DEEPGRAM_API_KEY: ${VITE_DEEPGRAM_API_KEY:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - zoomscribe_network

volumes:
  backend_data:

networks:
  zoomscribe_network:
    name: zoomscribe_network
